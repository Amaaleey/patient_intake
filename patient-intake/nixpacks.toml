[phases.setup]
nixPkgs = ["python311", "nodejs_20", "pip"]

[phases.install]
cmds = [
  "cd backend && python3 -m pip install -r requirements.txt",
  "cd frontend && npm install && npm run build"
]

[start]
cmd = "cd backend && python3 start_mcp_servers.py & python3 -m uvicorn main:app --host 0.0.0.0 --port $PORT"